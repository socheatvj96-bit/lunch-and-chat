{% extends "admin/base_site.html" %}
{% block content %}
<h1>📣 Отправить Push-уведомление всем подписчикам</h1>
<p>Подписчиков: <strong>{{ subscribers_count }}</strong></p>
{% if success %}<div class="success" style="background:#d4edda;border:1px solid #c3e6cb;padding:12px;border-radius:6px;margin-bottom:16px;color:#155724;">✅ {{ success }}</div>{% endif %}
{% if error %}<div class="errornote">{{ error }}</div>{% endif %}
<form method="post">
    {% csrf_token %}
    <div style="margin-bottom:12px;">
        <label><strong>Заголовок:</strong><br>
        <input type="text" name="title" value="Обеды ПМ" style="width:100%;max-width:500px;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:4px;margin-top:4px;"></label>
    </div>
    <div style="margin-bottom:12px;">
        <label><strong>Текст сообщения:</strong><br>
        <textarea name="text" rows="4" style="width:100%;max-width:500px;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:4px;margin-top:4px;" required placeholder="Введите текст уведомления..."></textarea></label>
    </div>
    <input type="submit" value="Отправить всем" class="button default" style="padding:10px 24px;font-size:15px;">
</form>
<br><a href="../">← Назад к списку</a>
{% endblock %}
